<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エージェント一覧 — Pattern B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/theme-b.css">
<style>
.list-head { padding:40px 0 22px; }
.list-head h1 { font-size:clamp(26px,3.2vw,36px); font-weight:700; letter-spacing:-.02em; }
.list-head p { margin-top:8px; font-size:14.5px; color:var(--muted); max-width:60ch; }

.toolbar { position:sticky; top:62px; z-index:50; background:rgba(255,255,255,.9); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line); padding:14px 0; }
.toolbar .wrap { display:flex; gap:14px; align-items:center; }
.toolbar .search-box { flex:1; }

.layout { display:grid; grid-template-columns:236px 1fr; gap:32px; padding:26px 0 0; align-items:start; }
.rail { position:sticky; top:130px; max-height:calc(100vh - 150px); overflow-y:auto; padding-right:4px; }
.rail::-webkit-scrollbar { width:6px; }
.rail::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:3px; }
.rail-title { font-size:12px; font-weight:500; color:var(--muted); padding:0 12px 8px; }
.result-bar { display:flex; align-items:baseline; gap:8px; margin-bottom:18px; font-size:13.5px; color:var(--muted); }
.result-bar b { font-size:24px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; letter-spacing:-.01em; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:16px; }
.more-wrap { text-align:center; padding:40px 0 8px; }

@media (max-width:860px){
  .layout { grid-template-columns:1fr; gap:18px; }
  .rail { position:static; }
  .chips { flex-direction:row; flex-wrap:wrap; }
  .chip { border:1px solid var(--line-2); border-radius:100px; }
}
</style>
</head>
<body data-page="list" data-badges data-detail="page">

<header class="site-head">
  <div class="wrap">
    <a class="brand" href="../index.html">
      <span class="brand-logo">AI</span>
      <span class="brand-name">Assets <b>for</b> AI Agent</span>
    </a>
    <nav class="nav">
      <a href="../index.html" data-i18n="nav_home">ホーム</a>
      <a href="agents.html" aria-current="page" data-i18n="nav_agents">エージェント一覧</a>
      <a href="feedback.html">要望を送る</a>
    </nav>
  </div>
</header>

<section class="list-head"><div class="wrap">
  <h1 data-i18n="list_h1">エージェント一覧</h1>
  <p data-i18n="list_desc">公開中のAIエージェントを横断検索。キーワード・カテゴリ・並び順で、目的のエージェントへ素早くたどり着けます。</p>
</div></section>

<div class="toolbar"><div class="wrap">
  <div class="search-box">
    <span class="ic">⌕</span>
    <input id="q" type="text" placeholder="エージェント名・オーナー・概要で検索…" data-i18n-ph="search_ph" autocomplete="off">
  </div>
  <div class="sort-wrap">
    <label for="sort" data-i18n="sort_label">並び順</label>
    <select id="sort">
      <option value="views" data-i18n="sort_views">人気順（ビュー）</option>
      <option value="downloads" data-i18n="sort_downloads">利用実績順（DL）</option>
      <option value="newest" data-i18n="sort_newest">新着順</option>
      <option value="likes" data-i18n="sort_likes">いいね順</option>
      <option value="title" data-i18n="sort_title">名前順</option>
    </select>
  </div>
</div></div>

<main class="wrap">
  <div class="layout">
    <aside class="rail">
      <div class="rail-title" data-i18n="rail_cats">カテゴリ</div>
      <div class="chips" id="chips"></div>

      <div class="facets">
        <div class="facet-group-head">
          <div class="rail-title" data-i18n="rail_filter">絞り込み</div>
          <button id="facet-reset" class="facet-reset-btn" style="display:none" data-i18n="facet_reset">リセット</button>
        </div>

        <div class="facet-group">
          <div class="facet-group-label" data-i18n="facet_cap_label">機能タグ</div>
          <div class="facet-pills" id="facet-cap-pills"></div>
        </div>

        <label class="facet-field">
          <span data-i18n="facet_date_label">更新日</span>
          <select id="facet-date">
            <option value="" data-i18n="facet_all">すべて</option>
            <option value="1m" data-i18n="facet_date_1m">過去1ヶ月</option>
            <option value="3m" data-i18n="facet_date_3m">過去3ヶ月</option>
            <option value="year" data-i18n="facet_date_year">今年</option>
          </select>
        </label>

        <label class="facet-field">
          <span data-i18n="facet_dl_label">DL実績</span>
          <select id="facet-dl">
            <option value="0" data-i18n="facet_all">すべて</option>
            <option value="10" data-i18n="facet_dl_10">10件以上</option>
            <option value="50" data-i18n="facet_dl_50">50件以上</option>
            <option value="100" data-i18n="facet_dl_100">100件以上</option>
          </select>
        </label>

        <div class="facet-group">
          <div class="facet-group-label" data-i18n="facet_tag_label">タグ</div>
          <div class="facet-pills" id="facet-tag-pills"></div>
        </div>
      </div>
    </aside>
    <div>
      <div class="result-bar"><b id="result-count">0</b> <span data-i18n="result_suffix">件のエージェント</span></div>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty">
        <div class="big" data-i18n="empty_title_b">該当なし</div>
        <p data-i18n="empty_msg">条件に合うエージェントが見つかりませんでした。キーワードやカテゴリを変えてお試しください。</p>
      </div>
      <div class="more-wrap"><button id="more" style="display:none">さらに表示</button></div>
    </div>
  </div>
</main>

<footer class="site-foot"><div class="wrap">
  <div class="foot-brand">AI Assets <b>for</b> AI Agent</div>
  <div class="foot-meta">© 2026 ABC Group AI Center of Excellence<br><span class="demo-note">※ 統計データの一部はデモ用サンプルデータです</span></div>
</div></footer>

<script src="../assets/app.js"></script>
<script src="../assets/api.js"></script>
<script>
(function(){ var s=new URLSearchParams(location.search).get('sort'); if(s){var el=document.getElementById('sort'); if(el) el.value=s;} })();
</script>
</body>
</html>
