<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エージェント一覧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../assets/theme-b.css">
<style>
.list-head { padding:40px 0 22px; }
.list-head h1 { font-size:clamp(26px,3.2vw,36px); font-weight:700; letter-spacing:-.02em; }
.list-head p { margin-top:8px; font-size:14.5px; color:var(--muted); max-width:60ch; }

.toolbar { position:sticky; top:62px; z-index:50; background:rgba(255,255,255,.9); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line); padding:14px 0; }
.toolbar .wrap { display:flex; gap:14px; align-items:center; }
.toolbar .search-box { flex:1; }

/* やりたいこと検索パネル — 課題入力から3件以内に絞り込んで提示するため通常フローに配置 */
.discovery { background:var(--surface); border-bottom:1px solid var(--line); padding:20px 0 24px; }
.discovery-inner { display:flex; flex-direction:column; gap:14px; }
.discovery-label { font-size:11.5px; font-weight:700; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; }
.discovery-form { display:flex; gap:10px; align-items:flex-start; }
.discovery-textarea {
  flex:1; font-family:var(--sans); font-size:14px; line-height:1.6; color:var(--ink);
  background:var(--bg); border:1.5px solid var(--line-2); border-radius:8px;
  padding:10px 14px; resize:none; min-height:52px; max-height:120px;
  transition:border-color .18s;
}
.discovery-textarea:focus { outline:none; border-color:var(--red); }
.discovery-textarea::placeholder { color:var(--muted); }
.discovery-submit {
  font-family:var(--sans); font-size:13.5px; font-weight:600;
  background:var(--ink); color:var(--paper-2); border:none; border-radius:8px;
  padding:10px 18px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:background .18s;
}
.discovery-submit:hover { background:var(--red); }
.discovery-clear {
  font-family:var(--sans); font-size:12px; color:var(--muted); background:none; border:none;
  cursor:pointer; padding:4px 6px; align-self:center; transition:color .15s;
}
.discovery-clear:hover { color:var(--ink); }
.discovery-results { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; }
.discovery-card {
  background:var(--bg); border:1.5px solid var(--line-2); border-radius:10px;
  padding:14px 16px; cursor:pointer; transition:border-color .18s, transform .18s, box-shadow .18s;
  display:flex; flex-direction:column; gap:6px;
}
.discovery-card:hover { border-color:var(--red); transform:translateY(-2px); box-shadow:0 6px 18px -6px rgba(200,16,46,.25); }
.discovery-card-rank { font-family:var(--mono); font-size:10px; color:var(--red); font-weight:700; letter-spacing:.1em; }
.discovery-card-cat { font-size:11px; color:var(--muted); }
.discovery-card-title { font-size:14px; font-weight:700; color:var(--ink); line-height:1.4; }
.discovery-card-reason { font-size:12px; color:var(--muted); line-height:1.5; }
.discovery-empty { font-size:14px; color:var(--muted); padding:8px 0; }
@media (max-width:700px) {
  .discovery-results { grid-template-columns:1fr; }
  .discovery-form { flex-direction:column; }
  .discovery-submit { align-self:flex-start; }
}

.layout { display:grid; grid-template-columns:236px 1fr; gap:32px; padding:26px 0 0; align-items:start; }
.rail { position:sticky; top:130px; max-height:calc(100vh - 150px); overflow-y:auto; padding-right:4px; }
.rail::-webkit-scrollbar { width:6px; }
.rail::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:3px; }
.rail-title { font-size:12px; font-weight:500; color:var(--muted); padding:0 12px 8px; }
.result-bar { display:flex; align-items:baseline; gap:8px; margin-bottom:18px; font-size:13.5px; color:var(--muted); }
.result-bar b { font-size:24px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums; letter-spacing:-.01em; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:16px; }
.more-wrap { text-align:center; padding:40px 0 8px; }

@media (max-width:860px){
  .layout { grid-template-columns:1fr; gap:18px; }
  .rail { position:static; }
  .chips { flex-direction:row; flex-wrap:wrap; }
  .chip { border:1px solid var(--line-2); border-radius:100px; }
}
</style>
</head>
<body data-page="list" data-badges data-detail="page">

<header class="site-head">
  <div class="wrap">
    <a class="brand" href="../index.html">
      <span class="brand-logo">AI</span>
      <span class="brand-name">Assets <b>for</b> AI Agent</span>
    </a>
    <nav class="nav">
      <a href="../index.html" data-i18n="nav_home">ホーム</a>
      <a href="agents.html" aria-current="page" data-i18n="nav_agents">エージェント一覧</a>
      <a href="feedback.html">要望を送る</a>
    </nav>
  </div>
</header>

<section class="list-head"><div class="wrap">
  <h1 data-i18n="list_h1">エージェント一覧</h1>
  <p data-i18n="list_desc">公開中のAIエージェントを横断検索。キーワード・カテゴリ・並び順で、目的のエージェントへ素早くたどり着けます。</p>
</div></section>

<section class="discovery" id="discovery-panel" aria-label="やりたいことで探す">
  <div class="wrap discovery-inner">
    <div class="discovery-label">やりたいことで探す</div>
    <div class="discovery-form">
      <textarea
        id="discovery-input"
        class="discovery-textarea"
        rows="2"
        placeholder="例：営業提案書を素早く作りたい、競合他社の情報を調査したい…"
      ></textarea>
      <button type="button" class="discovery-submit" id="discovery-search">絞り込む</button>
      <button type="button" class="discovery-clear" id="discovery-clear" hidden aria-label="クリア">✕</button>
    </div>
    <div id="discovery-results" hidden></div>
  </div>
</section>

<div class="toolbar"><div class="wrap">
  <div class="search-box">
    <span class="ic">⌕</span>
    <input id="q" type="text" placeholder="エージェント名・オーナー・概要で検索…" data-i18n-ph="search_ph" autocomplete="off">
  </div>
  <div class="sort-wrap">
    <label for="sort" data-i18n="sort_label">並び順</label>
    <select id="sort">
      <option value="views" data-i18n="sort_views">人気順（ビュー）</option>
      <option value="downloads" data-i18n="sort_downloads">利用実績順（DL）</option>
      <option value="newest" data-i18n="sort_newest">新着順</option>
      <option value="likes" data-i18n="sort_likes">いいね順</option>
      <option value="title" data-i18n="sort_title">名前順</option>
    </select>
  </div>
</div></div>

<main class="wrap">
  <div class="layout">
    <aside class="rail">
      <div class="rail-title" data-i18n="rail_cats">カテゴリ</div>
      <div class="chips" id="chips"></div>

      <div class="facets">
        <div class="facet-group-head">
          <div class="rail-title" data-i18n="rail_filter">絞り込み</div>
          <button id="facet-reset" class="facet-reset-btn" style="display:none" data-i18n="facet_reset">リセット</button>
        </div>

        <div class="facet-group">
          <div class="facet-group-label" data-i18n="facet_cap_label">機能タグ</div>
          <div class="facet-pills" id="facet-cap-pills"></div>
        </div>

        <label class="facet-field">
          <span data-i18n="facet_date_label">更新日</span>
          <select id="facet-date">
            <option value="" data-i18n="facet_all">すべて</option>
            <option value="1m" data-i18n="facet_date_1m">過去1ヶ月</option>
            <option value="3m" data-i18n="facet_date_3m">過去3ヶ月</option>
            <option value="year" data-i18n="facet_date_year">今年</option>
          </select>
        </label>

        <label class="facet-field">
          <span data-i18n="facet_dl_label">DL実績</span>
          <select id="facet-dl">
            <option value="0" data-i18n="facet_all">すべて</option>
            <option value="10" data-i18n="facet_dl_10">10件以上</option>
            <option value="50" data-i18n="facet_dl_50">50件以上</option>
            <option value="100" data-i18n="facet_dl_100">100件以上</option>
          </select>
        </label>

        <div class="facet-group">
          <div class="facet-group-label" data-i18n="facet_tag_label">タグ</div>
          <div class="facet-pills" id="facet-tag-pills"></div>
        </div>
      </div>
    </aside>
    <div>
      <div class="result-bar"><b id="result-count">0</b> <span data-i18n="result_suffix">件のエージェント</span></div>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty">
        <div class="big" data-i18n="empty_title_b">該当なし</div>
        <p data-i18n="empty_msg">条件に合うエージェントが見つかりませんでした。キーワードやカテゴリを変えてお試しください。</p>
      </div>
      <div class="more-wrap"><button id="more" style="display:none">さらに表示</button></div>
    </div>
  </div>
</main>

<footer class="site-foot"><div class="wrap">
  <div class="foot-brand">AI Assets <b>for</b> AI Agent</div>
  <div class="foot-meta">© 2026 ABC Group AI Center of Excellence<br><span class="demo-note">※ 統計データの一部はデモ用サンプルデータです</span></div>
</div></footer>

<script src="../data/test.js"></script>
<script src="../assets/app.js"></script>
<script src="../assets/api.js"></script>
<script>
(function(){ var s=new URLSearchParams(location.search).get('sort'); if(s){var el=document.getElementById('sort'); if(el) el.value=s;} })();
</script>
<script>
/* やりたいことで探す — 自然言語スコアリングで最大3件に絞り込む */
(function () {
  var AGENT_PAGE = window.AGENT_PAGE || "agent.html";

  /* カテゴリ名を取る（app.jsのDATAとは別に自前でマッピング） */
  function getCatName(asset) {
    return (asset.type && asset.type.title) || "その他";
  }

  /* テキストをスペース・読点で分割してトークン配列に変換 */
  function tokenize(text) {
    return text.trim().toLowerCase().split(/[\s　、。,]+/).filter(function(t){ return t.length >= 1; });
  }

  /* アセット1件のスコアを計算 */
  function score(asset, tokens) {
    var s = 0;
    var reasons = [];
    var title   = (asset.title || "").toLowerCase();
    var cat     = getCatName(asset).toLowerCase();
    var tags    = (asset.tags || []).map(function(t){ return t.toLowerCase(); });
    var caps    = (asset.capabilities || []).map(function(c){ return typeof c === "string" ? c.toLowerCase() : ""; });
    var desc    = (asset.overview || asset.description || "").replace(/<[^>]*>/g, "").toLowerCase();

    tokens.forEach(function(tok) {
      tags.forEach(function(tg) {
        if (tg.includes(tok)) { s += 3; reasons.push("タグ「" + tg + "」が一致"); }
      });
      if (cat.includes(tok)) { s += 2; reasons.push("カテゴリ「" + getCatName(asset) + "」が一致"); }
      if (title.includes(tok)) { s += 2; reasons.push("名称に「" + tok + "」を含む"); }
      caps.forEach(function(c) {
        if (c.includes(tok)) { s += 1; reasons.push("機能「" + c + "」が一致"); }
      });
      if (desc.includes(tok)) { s += 1; }
    });

    /* 重複理由を除去 */
    var uniq = reasons.filter(function(r, i){ return reasons.indexOf(r) === i; });
    return { asset: asset, score: s, reason: uniq.slice(0, 2).join("・") };
  }

  function search(text) {
    var assets = window.ASSETS_DATA && window.ASSETS_DATA.assets;
    if (!assets || !assets.length) return [];
    var tokens = tokenize(text);
    if (!tokens.length) return [];

    var scored = assets.map(function(a){ return score(a, tokens); })
                       .filter(function(r){ return r.score > 0; })
                       .sort(function(a, b){ return b.score - a.score; })
                       .slice(0, 3);
    return scored;
  }

  function esc(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function renderResults(results) {
    var el = document.getElementById("discovery-results");
    if (!el) return;

    if (!results.length) {
      el.innerHTML = '<p class="discovery-empty">条件に合うアセットが見つかりませんでした。別の言葉で試してみてください。</p>';
      el.hidden = false;
      return;
    }

    var html = '<div class="discovery-results" role="list">';
    results.forEach(function(r, i) {
      var label = ["1位 おすすめ", "2位", "3位"][i] || (i+1) + "位";
      html += '<article class="discovery-card" role="listitem" data-id="' + esc(r.asset.id) + '" tabindex="0">'
        + '<span class="discovery-card-rank">' + label + '</span>'
        + '<span class="discovery-card-cat">' + esc(getCatName(r.asset)) + '</span>'
        + '<span class="discovery-card-title">' + esc(r.asset.title) + '</span>'
        + (r.reason ? '<span class="discovery-card-reason">' + esc(r.reason) + '</span>' : '')
        + '</article>';
    });
    html += '</div>';
    el.innerHTML = html;
    el.hidden = false;

    /* カードクリックで詳細ページへ遷移 */
    el.querySelectorAll(".discovery-card").forEach(function(card) {
      function go() { location.href = AGENT_PAGE + "?id=" + card.dataset.id; }
      card.addEventListener("click", go);
      card.addEventListener("keydown", function(e){ if (e.key === "Enter" || e.key === " ") go(); });
    });
  }

  function init() {
    var input  = document.getElementById("discovery-input");
    var btn    = document.getElementById("discovery-search");
    var clrBtn = document.getElementById("discovery-clear");
    var resEl  = document.getElementById("discovery-results");
    if (!input || !btn) return;

    function run() {
      var text = input.value;
      if (!text.trim()) { resEl.hidden = true; clrBtn.hidden = true; return; }
      clrBtn.hidden = false;
      renderResults(search(text));
    }

    btn.addEventListener("click", run);
    input.addEventListener("keydown", function(e) {
      /* Shift+Enter で改行、Enter単独で検索 */
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); run(); }
    });

    clrBtn.addEventListener("click", function() {
      input.value = "";
      resEl.hidden = true;
      clrBtn.hidden = true;
      input.focus();
    });
  }

  /* DOMContentLoadedの後にinit（app.jsより後に読み込まれるため即時でも可だが念のため） */
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
