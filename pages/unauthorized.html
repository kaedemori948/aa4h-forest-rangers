<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクセス権限なし — AI Assets for AI Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/theme-b.css">
<style>
.wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}
.card {
  max-width: 480px;
  width: 100%;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 48px 40px;
  text-align: center;
}
.icon {
  font-size: 40px;
  margin-bottom: 20px;
}
h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 12px;
}
p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 32px;
}
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  border: 1px solid var(--line);
  border-radius: 100px;
  padding: 9px 20px;
  text-decoration: none;
  transition: border-color .15s, color .15s;
}
.btn-back:hover {
  border-color: var(--ink);
  color: var(--ink);
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="icon">🔒</div>
    <h1>アクセスできません</h1>
    <p>このサイトは許可されたアカウントのみ利用できます。<br>
       アクセスが必要な場合は管理者にお問い合わせください。</p>
    <a class="btn-back" href="https://github.com">← GitHub に戻る</a>
  </div>
</div>
</body>
</html>
