name: Handle proposal revise label

on:
  pull_request:
    types: [labeled]

jobs:
  handle-revise:
    if: "github.event.label.name == 'proposal: revise'"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Post rejection comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `## 却下理由

            <!- レビュアーが却下理由をここに追記してください ->`,
            });

      - name: Update linked issue label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Extract linked issue number from PR body (e.g. "Closes #123", "Fixes #123", "#123")
            const match = body.match(/(?:closes?|fixes?|resolves?)\s+#(\d+)/i)
                       || body.match(/#(\d+)/);

            if (!match) return;

            const issueNumber = parseInt(match[1], 10);
            console.log(`Linked issue: #${issueNumber}`);

            // Fetch current labels on the issue
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            // Remove existing proposal:* labels and add proposal: revise
            const proposalLabels = ['proposal: needed', 'proposal: ready', 'proposal: approved', 'proposal: revise'];
            const otherLabels = issue.labels
              .map(l => l.name)
              .filter(name => !proposalLabels.includes(name));

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: [...otherLabels, 'proposal: revise'],
            });

            console.log(`Updated issue #${issueNumber} labels.`);
